{{ if .IsHome }}
<header>
  <div class="badge-ai">AI POWERED</div>
  <h1>AI Powered Coding Team</h1>

  <div class="banner">
    <div class="banner-carousel" aria-label="Banner rotativo">
      {{ range readDir "static/banners" }}
        {{ if not .IsDir }}
          <img class="banner-slide"
               src="{{ (printf "banners/%s" .Name) | relURL }}"
               alt="AI Powered Coding Team"
               width="100%"/>
        {{ end }}
      {{ end }}
    </div>
  </div>

  <div class="shields">
    <img src="https://img.shields.io/badge/licen%C3%A7a-MIT-4f6ef7?style=flat-square" alt="Licença MIT"/>
    <img src="https://img.shields.io/badge/AI-powered-a855f7?style=flat-square" alt="AI Powered"/>
    <img src="https://img.shields.io/badge/contribui%C3%A7%C3%A3o-bem--vinda-10b981?style=flat-square" alt="Contribuições bem-vindas"/>
    <img src="https://img.shields.io/badge/Open_Source-%E2%99%A5-ff6b6b?style=flat-square" alt="Open Source"/>
  </div>
</header>
{{ else }}
<div class="page-header">
  <a href="{{ .Site.Home.RelPermalink }}" class="site-name">← AI Powered Coding Team</a>
  <h1>{{ .Title }}</h1>
  <div class="banner banner-compact">
    <div class="banner-carousel" aria-label="Banner rotativo">
      {{ range readDir "static/banners" }}
        {{ if not .IsDir }}
          <img class="banner-slide"
               src="{{ (printf "banners/%s" .Name) | relURL }}"
               alt="{{ $.Site.Title }}"
               width="100%"/>
        {{ end }}
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
