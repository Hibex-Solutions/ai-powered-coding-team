name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Atualiza dados do site
        run: bash eng/update-site-data.sh "${{ steps.pages.outputs.base_url }}"

      - name: Envia artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - name: Publica no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
