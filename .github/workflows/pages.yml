name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instala Hugo
        env:
          HUGO_VERSION: "0.147.0"
        run: |
          wget -O hugo.tar.gz \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
          tar -xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo

      - name: Copia scripts de instalação para o site
        run: |
          cp eng/install.sh docs/site/static/install.sh
          cp eng/install.ps1 docs/site/static/install.ps1

      - name: Build do site
        run: hugo --source docs/site --destination public --minify

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Envia artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/public

      - name: Publica no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
